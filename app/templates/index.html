<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vergi Məlumat Sistemi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark">VMS</div>
      <div class="logo-text">
        <span class="logo-title">Vergi Məlumat</span>
        <span class="logo-sub">Sistemi</span>
      </div>
    </div>

    <div class="sidebar-meta">
      <div class="meta-row">
        <span class="meta-label">Model</span>
        <span class="meta-value mono">gemini-2.5-flash</span>
      </div>
      <div class="meta-row">
        <span class="meta-label">Verilənlər bazası</span>
        <span class="meta-value mono" id="db-count">—</span>
      </div>
      <div class="meta-row">
        <span class="meta-label">Status</span>
        <span class="meta-value" id="status-dot">
          <span class="dot dot--loading"></span>
          <span id="status-text">Yüklənir...</span>
        </span>
      </div>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-section-title">Son sorğular</div>
    <div class="history-list" id="history-list">
      <div class="history-empty">Hələ sorğu yoxdur</div>
    </div>

    <div class="sidebar-footer">
      <a href="https://www.taxes.gov.az" target="_blank" class="source-link">
        taxes.gov.az ↗
      </a>
    </div>
  </aside>

  <!-- ── Main ────────────────────────────────────────────── -->
  <main class="main">

    <!-- Empty state -->
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">⌘</div>
      <h2 class="empty-title">Vergi sualınızı yazın</h2>
      <p class="empty-sub">taxes.gov.az məlumat bazasına əsaslanan cavablar</p>
      <div class="suggestions">
        <button class="suggestion" onclick="fillQuery(this)">VÖEN-in ləğvi proseduru necədir?</button>
        <button class="suggestion" onclick="fillQuery(this)">Gəlir vergisi neçə faizdir?</button>
        <button class="suggestion" onclick="fillQuery(this)">ƏDV qeydiyyatı üçün dövriyyə həddi?</button>
        <button class="suggestion" onclick="fillQuery(this)">Kriptovalyuta vergisi necə hesablanır?</button>
      </div>
    </div>

    <!-- Chat messages -->
    <div class="chat-messages" id="chat-messages"></div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="query-input"
          class="query-input"
          placeholder="Vergi sualınızı yazın..."
          rows="1"
          autofocus
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="sendQuery()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="input-hint">
        <kbd>Enter</kbd> göndər &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> yeni sətir
      </div>
    </div>

  </main>

  <script src="/static/app.js"></script>
</body>
</html>
